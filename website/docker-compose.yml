services:
  web:
    build:
      context: .
      dockerfile: Dockerfile
    working_dir: /app
    user: "${UID:-1000}:${GID:-1000}"
    command: npm run dev -- --hostname 0.0.0.0
    ports:
      - "3000:3000"
    env_file:
      - .env
    environment:
      DATABASE_URL: postgresql://postgres:postgres@db:5432/educore?schema=public
      DOCKER_CONTAINER: "1"
    depends_on:
      - db
    volumes:
      - .:/app
      - website_node_modules:/app/node_modules

  db:
    image: postgres:16
    restart: unless-stopped
    environment:
      POSTGRES_DB: educore
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    volumes:
      - website_postgres_data:/var/lib/postgresql/data

volumes:
  website_node_modules:
  website_postgres_data:
